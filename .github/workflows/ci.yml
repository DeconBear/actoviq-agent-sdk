name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-linux:
    name: Linux / Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - 20
          - 22

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm ci

      - name: Install Linux rolldown native binding
        run: npm install --no-save --package-lock=false @rolldown/binding-linux-x64-gnu@1.0.0-rc.12

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # electron 42 requires Node ≥22, so the src/gui build only runs there.
      # The npm package ships gui sources; electron-builder compiles them in dist:win.
      - name: Build
        if: matrix.node == 22
        run: |
          npm install --no-save --package-lock=false electron@42.4.1
          npm run build

  test-windows:
    name: Windows / Node 22
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  package-check:
    name: Package Dry Run
    runs-on: ubuntu-latest
    needs:
      - test-linux
      - test-windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Install Linux rolldown native binding
        run: npm install --no-save --package-lock=false @rolldown/binding-linux-x64-gnu@1.0.0-rc.12

      - name: Install electron (for src/gui typecheck/build)
        run: npm install --no-save --package-lock=false electron@42.4.1

      - name: Build
        run: npm run build

      - name: Verify npm package contents
        run: npm pack --dry-run

  # Phase 0 de-risk (workbench terminal engine): proves the native dependencies
  # work inside Electron headlessly on every push. Self-contained harness under
  # scripts/pty-spike/ (installs its own electron + node-pty + @xterm). arm64 is
  # experimental — node-pty ships win32-arm64 N-API prebuilts (see
  # scripts/pty-spike/README.md), but the windows-11-arm runner may be
  # unavailable on some plans; a pending/failed arm64 leg is non-blocking.
  pty-spike:
    name: PTY/xterm smoke (${{ matrix.label }})
    runs-on: ${{ matrix.runs-on }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: windows-latest
            label: x64
            experimental: false
          - runs-on: windows-11-arm
            label: arm64
            experimental: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install harness dependencies
        working-directory: scripts/pty-spike
        run: npm ci

      - name: Run PTY/xterm smoke
        working-directory: scripts/pty-spike
        run: npm run smoke
