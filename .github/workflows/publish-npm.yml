name: Publish npm Package

on:
  push:
    tags:
      - 'v*'
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Validate release tag matches package version
        if: github.event_name == 'release' || github.event_name == 'push'
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "${{ github.event_name }}" == "release" ]]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          if [[ "$RELEASE_TAG" != "$PACKAGE_VERSION" && "$RELEASE_TAG" != "v$PACKAGE_VERSION" ]]; then
            echo "Release tag '$RELEASE_TAG' does not match package version '$PACKAGE_VERSION'."
            exit 1
          fi

      - name: Check whether this version already exists on npm
        id: npm_version
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Package ${PACKAGE_NAME}@${PACKAGE_VERSION} is already published."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Package ${PACKAGE_NAME}@${PACKAGE_VERSION} is not published yet."
          fi

      - name: Typecheck
        if: steps.npm_version.outputs.exists != 'true'
        run: npm run typecheck

      - name: Test
        if: steps.npm_version.outputs.exists != 'true'
        run: npm test

      - name: Build
        if: steps.npm_version.outputs.exists != 'true'
        run: npm run build

      - name: Check trusted publishing prerequisites
        if: steps.npm_version.outputs.exists != 'true'
        shell: bash
        run: |
          echo "Publishing with npm trusted publishing (OIDC)."
          echo "Expected npm trusted publisher configuration:"
          echo "  Owner/Org: DeconBear"
          echo "  Repository: actoviq-agent-sdk"
          echo "  Workflow: publish-npm.yml"
          echo "  Environment: leave empty unless you explicitly use one"

      - name: Publish to npm
        if: steps.npm_version.outputs.exists != 'true'
        run: npm publish --access public
